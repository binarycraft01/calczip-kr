<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>주택담보대출 계산기 — CalcZip</title>
  <meta name="description" content="주택담보대출 월 상환금, 총이자, 상환 스케줄을 계산해보세요. 원리금균등·원금균등 방식 모두 지원." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/theme.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }
    .logo {
      font-family: 'DM Mono', monospace;
      font-size: 18px;
      font-weight: 500;
      color: var(--text);
      text-decoration: none;
    }
    .logo span { color: var(--accent); }
    .back-btn {
      font-size: 13px;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.15s;
    }
    .back-btn:hover { color: var(--text); }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    .page-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 1.5px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    h1 {
      font-size: clamp(22px, 4vw, 32px);
      font-weight: 700;
      letter-spacing: -0.8px;
      margin-bottom: 6px;
    }
    .page-sub {
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 300;
      margin-bottom: 36px;
    }

    /* ── LAYOUT ── */
    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      align-items: start;
    }
    @media (max-width: 640px) {
      .layout { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
    }
    .card-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── INPUTS ── */
    .field { margin-bottom: 20px; }
    .field:last-of-type { margin-bottom: 0; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
    }
    label .hint {
      font-weight: 300;
      color: var(--text-muted);
      font-size: 12px;
      margin-left: 4px;
    }
    .input-wrap { position: relative; }
    input[type="number"] {
      width: 100%;
      padding: 10px 48px 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      color: var(--text);
      background: #fafaf8;
      outline: none;
      -moz-appearance: textfield;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button { -webkit-appearance: none; }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
      background: var(--surface);
    }
    .input-unit {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      color: var(--text-muted);
      pointer-events: none;
    }

    /* ── 상환 방식 탭 ── */
    .tab-group {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .tab-btn {
      flex: 1;
      padding: 9px 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fafaf8;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .tab-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .calc-btn {
      width: 100%;
      margin-top: 24px;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: -0.3px;
    }
    .calc-btn:hover { background: var(--accent-dark); }
    .calc-btn:active { transform: scale(0.98); }

    /* ── RESULT ── */
    .result-card {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    .result-card.show { display: block; }

    .result-hero {
      background: var(--accent);
      padding: 28px;
      color: #fff;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .result-hero-item { text-align: center; }
    .result-hero-label { font-size: 11px; opacity: 0.75; margin-bottom: 6px; font-weight: 300; }
    .result-hero-value {
      font-family: 'DM Mono', monospace;
      font-size: clamp(18px, 3vw, 24px);
      font-weight: 500;
      letter-spacing: -0.5px;
    }
    .result-hero-item.main .result-hero-value {
      font-size: clamp(22px, 4vw, 30px);
    }

    .result-body { padding: 24px 28px; }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }
    .summary-box {
      background: var(--bg);
      border-radius: 10px;
      padding: 14px 16px;
      text-align: center;
    }
    .summary-box .s-label { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; font-weight: 300; }
    .summary-box .s-value { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; }
    .summary-box.highlight .s-value { color: var(--accent); }

    /* ── 상환 스케줄 ── */
    .schedule-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .schedule-title { font-size: 13px; font-weight: 700; }
    .schedule-toggle {
      font-size: 12px;
      color: var(--accent);
      cursor: pointer;
      background: none;
      border: none;
      font-family: 'Noto Sans KR', sans-serif;
    }

    .schedule-wrap {
      max-height: 320px;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: 10px;
    }
    .schedule-wrap::-webkit-scrollbar { width: 4px; }
    .schedule-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    thead th {
      position: sticky;
      top: 0;
      background: #f5f4f0;
      padding: 10px 12px;
      text-align: right;
      font-weight: 500;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      letter-spacing: 0.3px;
    }
    thead th:first-child { text-align: center; }
    tbody td {
      padding: 9px 12px;
      text-align: right;
      border-bottom: 1px solid #f0ede6;
      font-family: 'DM Mono', monospace;
    }
    tbody td:first-child {
      text-align: center;
      font-family: 'Noto Sans KR', sans-serif;
      color: var(--text-muted);
      font-size: 11px;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: var(--accent-light); }

    .info-box {
      margin-top: 16px;
      padding: 14px 16px;
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 8px;
      font-size: 12px;
      color: #92400e;
      font-weight: 300;
      line-height: 1.6;
    }

    .share-row {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }
    .share-btn {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 13px;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      transition: background 0.15s;
      color: var(--text-muted);
    }
    .share-btn:hover { background: var(--bg); color: var(--text); }

    @media (max-width: 480px) {
      .summary-grid { grid-template-columns: 1fr 1fr; }
      .result-hero { grid-template-columns: 1fr; }
    }
  </style>
  <script src="/theme.js"></script>
  <script src="/footer.js"></script>
</head>
<body>

  <header>
    <div class="header-inner">
      <a href="/" class="logo">calc<span>zip</span>.kr</a>
      <a href="/" class="back-btn">← 전체 계산기</a>
      <button id="theme-toggle" class="theme-toggle"><span class="toggle-icon">🌙</span><span class="toggle-text">다크</span></button>
    </div>
  </header>

  <main>
    <p class="page-label">Finance · Loan</p>
    <h1>주택담보대출 계산기</h1>
    <p class="page-sub">원리금균등 · 원금균등 방식 / 월 상환금 + 총이자 + 상환 스케줄</p>

    <div class="layout">

      <!-- INPUT -->
      <div class="card">
        <div class="card-title">입력</div>

        <div class="tab-group">
          <button class="tab-btn active" id="tab-equal-payment" onclick="setMethod('equal-payment')">원리금균등</button>
          <button class="tab-btn" id="tab-equal-principal" onclick="setMethod('equal-principal')">원금균등</button>
        </div>

        <div class="field">
          <label>대출 금액 <span class="hint">만원 단위</span></label>
          <div class="input-wrap">
            <input type="number" id="loan-amount" placeholder="예: 30000" min="0" />
            <span class="input-unit">만원</span>
          </div>
        </div>

        <div class="field">
          <label>연 이자율</label>
          <div class="input-wrap">
            <input type="number" id="interest-rate" placeholder="예: 3.5" min="0" max="30" step="0.01" />
            <span class="input-unit">%</span>
          </div>
        </div>

        <div class="field">
          <label>대출 기간</label>
          <div class="input-wrap">
            <input type="number" id="loan-period" placeholder="예: 30" min="1" max="50" />
            <span class="input-unit">년</span>
          </div>
        </div>

        <button class="calc-btn" onclick="calculate()">상환금 계산하기</button>
      </div>

      <!-- RESULT -->
      <div id="result-card" class="result-card">
        <div class="result-hero">
          <div class="result-hero-item main">
            <div class="result-hero-label" id="r-hero-label">첫 달 상환금</div>
            <div class="result-hero-value" id="r-first-payment">—</div>
          </div>
          <div class="result-hero-item">
            <div class="result-hero-label">총 상환금액</div>
            <div class="result-hero-value" id="r-total">—</div>
          </div>
        </div>
        <div class="result-body">
          <div class="summary-grid">
            <div class="summary-box">
              <div class="s-label">대출 원금</div>
              <div class="s-value" id="r-principal">—</div>
            </div>
            <div class="summary-box highlight">
              <div class="s-label">총 이자</div>
              <div class="s-value" id="r-total-interest">—</div>
            </div>
            <div class="summary-box">
              <div class="s-label">이자 비율</div>
              <div class="s-value" id="r-interest-ratio">—</div>
            </div>
          </div>

          <div class="schedule-header">
            <span class="schedule-title">📋 연도별 상환 스케줄</span>
            <button class="schedule-toggle" onclick="toggleSchedule()">월별로 보기 ▾</button>
          </div>
          <div class="schedule-wrap">
            <table>
              <thead id="schedule-head"></thead>
              <tbody id="schedule-body"></tbody>
            </table>
          </div>

          <div class="info-box">
            ⚠️ 본 계산 결과는 참고용입니다. 실제 대출 조건(중도상환수수료, 우대금리 등)에 따라 달라질 수 있어요.
          </div>

          <div class="share-row">
            <button class="share-btn" onclick="copyResult()">📋 결과 복사</button>
            <button class="share-btn" onclick="resetAll()">↺ 다시 계산</button>
          </div>
        </div>
      </div>

    </div>
  </main>

  <script>
    let currentMethod = 'equal-payment'; // 원리금균등
    let showMonthly = false;
    let monthlySchedule = [];

    function setMethod(method) {
      currentMethod = method;
      document.getElementById('tab-equal-payment').classList.toggle('active', method === 'equal-payment');
      document.getElementById('tab-equal-principal').classList.toggle('active', method === 'equal-principal');
    }

    function fmt(n) {
      return Math.round(n).toLocaleString('ko-KR') + '원';
    }
    function fmtShort(n) {
      n = Math.round(n);
      if (n >= 100000000) {
        const eok = Math.floor(n / 100000000);
        const rem = Math.round((n % 100000000) / 10000);
        return rem === 0 ? `${eok}억원` : `${eok}억 ${rem.toLocaleString()}만원`;
      }
      if (n >= 10000) return `${Math.floor(n/10000).toLocaleString()}만원`;
      return n.toLocaleString() + '원';
    }

    function calculate() {
      const amount = parseFloat(document.getElementById('loan-amount').value) * 10000;
      const rate = parseFloat(document.getElementById('interest-rate').value);
      const years = parseInt(document.getElementById('loan-period').value);

      if (!amount || !rate || !years) { alert('모든 항목을 입력해주세요.'); return; }
      if (amount <= 0 || rate <= 0 || years <= 0) { alert('올바른 값을 입력해주세요.'); return; }

      const monthlyRate = rate / 100 / 12;
      const totalMonths = years * 12;

      monthlySchedule = [];

      if (currentMethod === 'equal-payment') {
        // 원리금균등: 매월 동일한 금액 상환
        const payment = amount * monthlyRate * Math.pow(1 + monthlyRate, totalMonths)
                        / (Math.pow(1 + monthlyRate, totalMonths) - 1);
        let balance = amount;
        let totalInterest = 0;

        for (let m = 1; m <= totalMonths; m++) {
          const interest = balance * monthlyRate;
          const principal = payment - interest;
          balance -= principal;
          totalInterest += interest;
          monthlySchedule.push({
            month: m,
            payment: Math.round(payment),
            principal: Math.round(principal),
            interest: Math.round(interest),
            balance: Math.max(0, Math.round(balance))
          });
        }

        const totalPayment = payment * totalMonths;
        document.getElementById('r-hero-label').textContent = '월 상환금 (고정)';
        document.getElementById('r-first-payment').textContent = fmtShort(payment);
        document.getElementById('r-total').textContent = fmtShort(totalPayment);
        document.getElementById('r-principal').textContent = fmtShort(amount);
        document.getElementById('r-total-interest').textContent = fmtShort(totalInterest);
        document.getElementById('r-interest-ratio').textContent = (totalInterest / amount * 100).toFixed(1) + '%';

        window._result = { amount, rate, years, method: '원리금균등', payment, totalPayment, totalInterest };

      } else {
        // 원금균등: 매월 원금 동일, 이자는 줄어듦
        const principalPayment = amount / totalMonths;
        let balance = amount;
        let totalInterest = 0;

        for (let m = 1; m <= totalMonths; m++) {
          const interest = balance * monthlyRate;
          const payment = principalPayment + interest;
          balance -= principalPayment;
          totalInterest += interest;
          monthlySchedule.push({
            month: m,
            payment: Math.round(payment),
            principal: Math.round(principalPayment),
            interest: Math.round(interest),
            balance: Math.max(0, Math.round(balance))
          });
        }

        const totalPayment = amount + totalInterest;
        const firstPayment = monthlySchedule[0].payment;
        document.getElementById('r-hero-label').textContent = '첫 달 상환금';
        document.getElementById('r-first-payment').textContent = fmtShort(firstPayment);
        document.getElementById('r-total').textContent = fmtShort(totalPayment);
        document.getElementById('r-principal').textContent = fmtShort(amount);
        document.getElementById('r-total-interest').textContent = fmtShort(totalInterest);
        document.getElementById('r-interest-ratio').textContent = (totalInterest / amount * 100).toFixed(1) + '%';

        window._result = { amount, rate, years, method: '원금균등', firstPayment, totalPayment, totalInterest };
      }

      renderSchedule();
      document.getElementById('result-card').classList.add('show');
      setTimeout(() => document.getElementById('result-card').scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
    }

    function renderSchedule() {
      const head = document.getElementById('schedule-head');
      const body = document.getElementById('schedule-body');

      if (showMonthly) {
        head.innerHTML = `<tr>
          <th>월차</th>
          <th>월 상환금</th>
          <th>원금</th>
          <th>이자</th>
          <th>잔여 원금</th>
        </tr>`;
        body.innerHTML = monthlySchedule.map(r => `
          <tr>
            <td>${r.month}회</td>
            <td>${r.payment.toLocaleString()}</td>
            <td>${r.principal.toLocaleString()}</td>
            <td>${r.interest.toLocaleString()}</td>
            <td>${r.balance.toLocaleString()}</td>
          </tr>`).join('');
      } else {
        // 연도별 집계
        const years = {};
        monthlySchedule.forEach(r => {
          const y = Math.ceil(r.month / 12);
          if (!years[y]) years[y] = { payment: 0, principal: 0, interest: 0, balance: 0 };
          years[y].payment += r.payment;
          years[y].principal += r.principal;
          years[y].interest += r.interest;
          years[y].balance = r.balance;
        });

        head.innerHTML = `<tr>
          <th>연도</th>
          <th>연 상환금</th>
          <th>원금</th>
          <th>이자</th>
          <th>잔여 원금</th>
        </tr>`;
        body.innerHTML = Object.entries(years).map(([y, r]) => `
          <tr>
            <td>${y}년차</td>
            <td>${Math.round(r.payment).toLocaleString()}</td>
            <td>${Math.round(r.principal).toLocaleString()}</td>
            <td>${Math.round(r.interest).toLocaleString()}</td>
            <td>${Math.round(r.balance).toLocaleString()}</td>
          </tr>`).join('');
      }
    }

    function toggleSchedule() {
      showMonthly = !showMonthly;
      document.querySelector('.schedule-toggle').textContent = showMonthly ? '연도별로 보기 ▴' : '월별로 보기 ▾';
      renderSchedule();
    }

    function copyResult() {
      const r = window._result;
      if (!r) return;
      const text =
`[CalcZip 주택담보대출 계산 결과]
대출 금액: ${fmt(r.amount)}
연 이자율: ${r.rate}%
대출 기간: ${r.years}년
상환 방식: ${r.method}

총 상환금액: ${fmt(r.totalPayment)}
대출 원금: ${fmt(r.amount)}
총 이자: ${fmt(r.totalInterest)}

calczip.kr`;
      navigator.clipboard.writeText(text).then(() => alert('결과가 클립보드에 복사됐어요!'));
    }

    function resetAll() {
      document.getElementById('loan-amount').value = '';
      document.getElementById('interest-rate').value = '';
      document.getElementById('loan-period').value = '';
      document.getElementById('result-card').classList.remove('show');
      setMethod('equal-payment');
    }
  </script>

</body>
</html>
