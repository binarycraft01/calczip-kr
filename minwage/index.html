<!DOCTYPE html>
<html lang="ko">
<head>
  <script src="/head.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>최저시급 계산기 — CalcZip.kr</title>
  <meta name="description" content="2024년 최저시급 9,860원 기준으로 일급, 주급, 월급을 계산해보세요." />  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; position: sticky; top: 0; z-index: 100; }
    .header-inner { max-width: 800px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 56px; }
    .logo { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 500; color: var(--text); text-decoration: none; }
    .logo span { color: var(--accent); }
    .back-btn { font-size: 13px; color: var(--text-muted); text-decoration: none; transition: color 0.15s; }
    .back-btn:hover { color: var(--text); }
    main { max-width: 800px; margin: 0 auto; padding: 40px 24px 80px; }
    .page-label { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 1.5px; color: var(--accent); text-transform: uppercase; margin-bottom: 12px; }
    h1 { font-size: clamp(22px, 4vw, 32px); font-weight: 700; letter-spacing: -0.8px; margin-bottom: 6px; }
    .page-sub { font-size: 14px; color: var(--text-muted); font-weight: 300; margin-bottom: 36px; }
    .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
    @media (max-width: 620px) { .layout { grid-template-columns: 1fr; } }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px; }
    .card-title { font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
    .field { margin-bottom: 20px; }
    label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 8px; }
    .input-wrap { position: relative; }
    input[type="number"] { width: 100%; padding: 10px 52px 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 15px; color: var(--text); background: #fafaf8; outline: none; -moz-appearance: textfield; transition: border-color 0.15s, box-shadow 0.15s; }
    input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); background: var(--surface); }
    .input-unit { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); font-size: 12px; color: var(--text-muted); pointer-events: none; }
    .badge { display: inline-block; background: var(--accent-light); color: var(--accent); font-family: 'DM Mono', monospace; font-size: 12px; padding: 4px 10px; border-radius: 6px; margin-bottom: 20px; }
    .calc-btn { width: 100%; margin-top: 24px; padding: 14px; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-family: 'Noto Sans KR', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: background 0.15s, transform 0.1s; }
    .calc-btn:hover { background: var(--accent-dark); }
    .calc-btn:active { transform: scale(0.98); }
    .result-card { display: none; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    .result-card.show { display: block; }
    .result-hero { background: var(--accent); padding: 28px; color: #fff; text-align: center; }
    .result-hero-label { font-size: 12px; opacity: 0.75; margin-bottom: 8px; font-weight: 300; }
    .result-hero-amount { font-family: 'DM Mono', monospace; font-size: clamp(28px, 5vw, 38px); font-weight: 500; letter-spacing: -1px; }
    .result-body { padding: 24px 28px; }
    .result-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
    .result-row:last-child { border-bottom: none; }
    .result-row .r-label { color: var(--text-muted); font-weight: 300; }
    .result-row .r-value { font-family: 'DM Mono', monospace; font-weight: 500; font-size: 15px; }
    .info-box { margin-top: 16px; padding: 14px 16px; background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px; font-size: 12px; color: #92400e; font-weight: 300; line-height: 1.6; }
    .share-row { display: flex; gap: 8px; margin-top: 16px; }
    .share-btn { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); font-size: 13px; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: background 0.15s; color: var(--text-muted); }
    .share-btn:hover { background: var(--bg); color: var(--text); }
  </style>
  <!-- Open Graph / 카카오톡·디스코드 링크 미리보기 -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="CalcZip.kr" />
  <meta property="og:title" content="최저시급 계산기 — CalcZip.kr" />
  <meta property="og:description" content="2024년 최저시급 9,860원 기준 일급·주급·월급과 주휴수당을 계산해요." />
  <meta property="og:url" content="https://calczip.kr/minwage/" />
  <meta property="og:image" content="https://calczip.kr/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale" content="ko_KR" />
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="최저시급 계산기 — CalcZip.kr" />
  <meta name="twitter:description" content="2024년 최저시급 9,860원 기준 일급·주급·월급과 주휴수당을 계산해요." />
  <meta name="twitter:image" content="https://calczip.kr/og-image.png" />
  <script src="/theme.js"></script>
  <script src="/footer.js"></script>
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="/" class="logo">calc<span>zip</span>.kr</a>
      <a href="/" class="back-btn">← 전체 계산기</a>
      <button id="theme-toggle" class="theme-toggle"><span class="toggle-icon">🌙</span><span class="toggle-text">다크</span></button>
    </div>
  </header>
  <main>
    <p class="page-label">Finance · Wage</p>
    <h1>최저시급 계산기</h1>
    <p class="page-sub">2024년 최저시급 9,860원 기준 · 일급 · 주급 · 월급 계산</p>
    <div class="layout">
      <div class="card">
        <div class="card-title">입력</div>
        <div class="badge">2024 최저시급 9,860원</div>
        <div class="field">
          <label>시급 <span style="font-size:11px;color:var(--text-muted);font-weight:300;">비워두면 최저시급 적용</span></label>
          <div class="input-wrap">
            <input type="number" id="hourly" placeholder="9860" />
            <span class="input-unit">원</span>
          </div>
        </div>
        <div class="field">
          <label>하루 근무 시간</label>
          <div class="input-wrap">
            <input type="number" id="hours-day" placeholder="8" min="1" max="24" />
            <span class="input-unit">시간</span>
          </div>
        </div>
        <div class="field">
          <label>주 근무 일수</label>
          <div class="input-wrap">
            <input type="number" id="days-week" placeholder="5" min="1" max="7" />
            <span class="input-unit">일</span>
          </div>
        </div>
        <button class="calc-btn" onclick="calculate()">급여 계산하기</button>
      </div>
      <div id="result-card" class="result-card">
        <div class="result-hero">
          <div class="result-hero-label">월 예상 급여</div>
          <div class="result-hero-amount" id="r-monthly">—</div>
        </div>
        <div class="result-body">
          <div class="result-row">
            <span class="r-label">적용 시급</span>
            <span class="r-value" id="r-hourly">—</span>
          </div>
          <div class="result-row">
            <span class="r-label">일급</span>
            <span class="r-value" id="r-daily">—</span>
          </div>
          <div class="result-row">
            <span class="r-label">주급 <span style="font-size:11px;font-weight:300;">(주휴수당 포함)</span></span>
            <span class="r-value" id="r-weekly">—</span>
          </div>
          <div class="result-row">
            <span class="r-label">월급 <span style="font-size:11px;font-weight:300;">(주휴수당 포함)</span></span>
            <span class="r-value" id="r-monthly2">—</span>
          </div>
          <div class="info-box">
            ⚠️ 주 15시간 이상 근무 시 주휴수당이 포함돼요. 실제 급여는 4대보험 공제 전 금액이에요.
          </div>
          <div class="share-row">
            <button class="share-btn" onclick="resetAll()">↺ 다시 계산</button>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script>
    function fmt(n) { return Math.round(n).toLocaleString('ko-KR') + '원'; }
    function calculate() {
      const hourly = parseFloat(document.getElementById('hourly').value) || 9860;
      const hoursDay = parseFloat(document.getElementById('hours-day').value) || 8;
      const daysWeek = parseFloat(document.getElementById('days-week').value) || 5;
      const dailyPay = hourly * hoursDay;
      const weeklyHours = hoursDay * daysWeek;
      // 주휴수당: 주 15시간 이상이면 1일치 추가
      const weeklyHoliday = weeklyHours >= 15 ? hourly * (weeklyHours / 40) * 8 : 0;
      const weeklyPay = dailyPay * daysWeek + weeklyHoliday;
      const monthlyPay = weeklyPay * (365 / 7 / 12);
      document.getElementById('r-hourly').textContent = fmt(hourly);
      document.getElementById('r-daily').textContent = fmt(dailyPay);
      document.getElementById('r-weekly').textContent = fmt(weeklyPay);
      document.getElementById('r-monthly').textContent = Math.round(monthlyPay / 10000).toLocaleString() + '만원';
      document.getElementById('r-monthly2').textContent = fmt(monthlyPay);
      document.getElementById('result-card').classList.add('show');
      setTimeout(() => document.getElementById('result-card').scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
    }
    function resetAll() {
      document.getElementById('hourly').value = '';
      document.getElementById('hours-day').value = '';
      document.getElementById('days-week').value = '';
      document.getElementById('result-card').classList.remove('show');
    }
  </script>
</body>
</html>
