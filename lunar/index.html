// 간지 계산
const CHEONGAN = ['갑','을','병','정','무','기','경','신','임','계'];
const JIJI = ['자','축','인','묘','진','사','오','미','신','유','술','해'];
const ANIMAL = ['쥐','소','호랑이','토끼','용','뱀','말','양','원숭이','닭','개','돼지'];
function getGanji(year) {
  const cg = CHEONGAN[(year-4)%10];
  const jj = JIJI[(year-4)%12];
  const animal = ANIMAL[(year-4)%12];
  return `${cg}${jj}년 (${animal})`;
}

      // 이 연도 안에 있음
      let monthIdx = 1;
      let normalMonth = 1;
      for (let i = 1; i < yearData.length; i++) {
        if (diffDays < yearData[i]) {
          lunarYear = 1900 + dataIdx;
          isLeap = (leapMonth > 0 && i === leapMonth + 1);
          lunarMonth = isLeap ? leapMonth : normalMonth;
          lunarDay = diffDays + 1;
          return { y: lunarYear, m: lunarMonth, d: lunarDay, leap: isLeap };
        }
        diffDays -= yearData[i];
        if (leapMonth > 0 && i === leapMonth) {
          // 윤달 처리
        } else {
          normalMonth++;
        }
        monthIdx++;
      }
      break;
    }
    diffDays -= totalDays;
    dataIdx++;
  }
  return null;
}

function solarToLunar() {
  const dateStr = document.getElementById('solar-date').value;
  if (!dateStr) { alert('날짜를 입력해주세요.'); return; }
  const [y,m,d] = dateStr.split('-').map(Number);
  const result = solarToLunarCalc(y, m, d);
  if (!result) { alert('지원 범위를 벗어났어요 (1900~2030년)'); return; }
  const leapStr = result.leap ? ' (윤달)' : '';
  document.getElementById('rs-lunar').textContent = `${result.y}년 ${result.m}월 ${result.d}일${leapStr}`;
  document.getElementById('rs-ganji').textContent = getGanji(result.y);
  document.getElementById('rs-leap').textContent = result.leap ? '윤달 ✓' : '평달';
  document.getElementById('res-solar').classList.add('show');
}

function lunarToSolar() {
  const ly = parseInt(document.getElementById('lunar-y').value);
  const lm = parseInt(document.getElementById('lunar-m').value);
  const ld = parseInt(document.getElementById('lunar-d').value);
  const isLeap = document.getElementById('is-leap').checked;
  if (!ly||!lm||!ld) { alert('음력 날짜를 모두 입력해주세요.'); return; }

  // 음력 → 양력: 1900.1.31부터 일수 계산
  const LUNAR_DATA = getLunarData();
  const base = new Date(1900, 0, 31);
  let totalDays = 0;
  let found = false;

  for (let yi = 0; yi < LUNAR_DATA.length; yi++) {
    const year = 1900 + yi;
    const yearData = LUNAR_DATA[yi];
    const leapMonth = yearData[0];
    let normalMonth = 1;
    for (let i = 1; i < yearData.length; i++) {
      const curIsLeap = (leapMonth > 0 && i === leapMonth + 1);
      const curMonth = curIsLeap ? leapMonth : normalMonth;
      if (year === ly && curMonth === lm && curIsLeap === isLeap) {
        totalDays += ld - 1;
        found = true; break;
      }
      totalDays += yearData[i];
      if (!curIsLeap) normalMonth++;
    }
    if (found) break;
  }

  if (!found) { alert('해당 날짜를 찾을 수 없어요.'); return; }
  const result = new Date(base.getTime() + totalDays * 86400000);
  const dow = ['일','월','화','수','목','금','토'][result.getDay()];
  document.getElementById('rl-solar').textContent = result.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});
  document.getElementById('rl-dow').textContent = dow+'요일';
  document.getElementById('rl-ganji').textContent = getGanji(ly);
  document.getElementById('res-lunar').classList.add('show');
}
