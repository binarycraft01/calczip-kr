<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>퍼센트 계산기 — CalcZip</title>
  <meta name="description" content="퍼센트 계산, 증감률, 비율을 빠르게 계산하세요."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;position:sticky;top:0;z-index:100}
    .header-inner{max-width:700px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px}
    .logo{font-family:'DM Mono',monospace;font-size:18px;font-weight:500;color:var(--text);text-decoration:none}.logo span{color:var(--accent)}
    .back-btn{font-size:13px;color:var(--text-muted);text-decoration:none}
    main{max-width:700px;margin:0 auto;padding:40px 24px 80px}
    .page-label{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1.5px;color:var(--accent);text-transform:uppercase;margin-bottom:12px}
    h1{font-size:clamp(22px,4vw,32px);font-weight:700;letter-spacing:-.8px;margin-bottom:6px}
    .page-sub{font-size:14px;color:var(--text-muted);font-weight:300;margin-bottom:36px}
    .section{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:16px}
    .section-title{font-size:13px;font-weight:700;margin-bottom:16px;color:var(--text)}
    .row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .row input{flex:1;min-width:80px;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-family:'DM Mono',monospace;font-size:15px;color:var(--text);background:#fafaf8;outline:none;-moz-appearance:textfield;transition:border-color .15s}
    .row input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
    .row input::-webkit-outer-spin-button,.row input::-webkit-inner-spin-button{-webkit-appearance:none}
    .row span{font-size:14px;color:var(--text-muted);white-space:nowrap}
    .result-badge{background:var(--accent);color:#fff;font-family:'DM Mono',monospace;font-size:18px;font-weight:700;padding:10px 18px;border-radius:8px;min-width:120px;text-align:center}
  </style>
  <script src="/theme.js"></script>
  <script src="/footer.js"></script>
</head>
<body>
  <header><div class="header-inner"><a href="/" class="logo">calc<span>zip</span>.kr</a><a href="/" class="back-btn">← 전체 계산기</a>
      <button id="theme-toggle" class="theme-toggle"><span class="toggle-icon">🌙</span><span class="toggle-text">다크</span></button></div></header>
  <main>
    <p class="page-label">Utility · Percent</p>
    <h1>퍼센트 계산기</h1>
    <p class="page-sub">비율 계산 · 증감률 · 역퍼센트 — 실시간 계산</p>

    <!-- 1. A의 X%는 얼마? -->
    <div class="section">
      <div class="section-title">① A의 X%는 얼마?</div>
      <div class="row">
        <input type="number" id="p1a" placeholder="숫자" oninput="calc1()"/>
        <span>의</span>
        <input type="number" id="p1x" placeholder="%" oninput="calc1()"/>
        <span>% =</span>
        <div class="result-badge" id="r1">—</div>
      </div>
    </div>

    <!-- 2. A는 B의 몇%? -->
    <div class="section">
      <div class="section-title">② A는 B의 몇 %?</div>
      <div class="row">
        <input type="number" id="p2a" placeholder="A" oninput="calc2()"/>
        <span>는</span>
        <input type="number" id="p2b" placeholder="B" oninput="calc2()"/>
        <span>의</span>
        <div class="result-badge" id="r2">—</div>
        <span>%</span>
      </div>
    </div>

    <!-- 3. A에서 B로 변했을 때 증감률 -->
    <div class="section">
      <div class="section-title">③ 증감률 (A → B)</div>
      <div class="row">
        <input type="number" id="p3a" placeholder="이전 값" oninput="calc3()"/>
        <span>→</span>
        <input type="number" id="p3b" placeholder="현재 값" oninput="calc3()"/>
        <span>=</span>
        <div class="result-badge" id="r3">—</div>
      </div>
    </div>

    <!-- 4. A가 X% 증가/감소하면? -->
    <div class="section">
      <div class="section-title">④ A가 X% 변하면?</div>
      <div class="row">
        <input type="number" id="p4a" placeholder="기준값" oninput="calc4()"/>
        <span>에서</span>
        <input type="number" id="p4x" placeholder="증감율 ±%" oninput="calc4()"/>
        <span>% 변화 =</span>
        <div class="result-badge" id="r4">—</div>
      </div>
    </div>
  </main>
  <script>
    function r(n, d=2) { return parseFloat(n.toFixed(d)); }
    function calc1() {
      const a=parseFloat(document.getElementById('p1a').value), x=parseFloat(document.getElementById('p1x').value);
      document.getElementById('r1').textContent = (a&&x!==undefined&&!isNaN(x)) ? r(a*x/100).toLocaleString() : '—';
    }
    function calc2() {
      const a=parseFloat(document.getElementById('p2a').value), b=parseFloat(document.getElementById('p2b').value);
      document.getElementById('r2').textContent = (a&&b) ? r(a/b*100) : '—';
    }
    function calc3() {
      const a=parseFloat(document.getElementById('p3a').value), b=parseFloat(document.getElementById('p3b').value);
      if (!a||!b) { document.getElementById('r3').textContent='—'; return; }
      const pct = r((b-a)/Math.abs(a)*100);
      document.getElementById('r3').textContent = (pct>=0?'+':'')+pct+'%';
    }
    function calc4() {
      const a=parseFloat(document.getElementById('p4a').value), x=parseFloat(document.getElementById('p4x').value);
      document.getElementById('r4').textContent = (a&&!isNaN(x)) ? r(a*(1+x/100)).toLocaleString() : '—';
    }
  </script>
</body>
</html>
