<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>신용대출 계산기 — CalcZip</title>
  <meta name="description" content="신용대출 월 이자와 총 상환액을 계산해보세요. 거치식·원리금균등 방식 지원." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/theme.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; position: sticky; top: 0; z-index: 100; }
    .header-inner { max-width: 800px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 56px; }
    .logo { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 500; color: var(--text); text-decoration: none; }
    .logo span { color: var(--accent); }
    .back-btn { font-size: 13px; color: var(--text-muted); text-decoration: none; transition: color 0.15s; }
    .back-btn:hover { color: var(--text); }
    main { max-width: 800px; margin: 0 auto; padding: 40px 24px 80px; }
    .page-label { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 1.5px; color: var(--accent); text-transform: uppercase; margin-bottom: 12px; }
    h1 { font-size: clamp(22px, 4vw, 32px); font-weight: 700; letter-spacing: -0.8px; margin-bottom: 6px; }
    .page-sub { font-size: 14px; color: var(--text-muted); font-weight: 300; margin-bottom: 36px; }
    .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
    @media (max-width: 620px) { .layout { grid-template-columns: 1fr; } }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px; }
    .card-title { font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
    .field { margin-bottom: 20px; }
    label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 8px; }
    .input-wrap { position: relative; }
    input[type="number"] { width: 100%; padding: 10px 52px 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 15px; color: var(--text); background: #fafaf8; outline: none; -moz-appearance: textfield; transition: border-color 0.15s, box-shadow 0.15s; }
    input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); background: var(--surface); }
    .input-unit { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); font-size: 12px; color: var(--text-muted); pointer-events: none; }
    .tab-group { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab-btn { flex: 1; padding: 9px 0; border: 1px solid var(--border); border-radius: 8px; background: #fafaf8; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 500; color: var(--text-muted); cursor: pointer; transition: all 0.15s; }
    .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .calc-btn { width: 100%; margin-top: 24px; padding: 14px; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-family: 'Noto Sans KR', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: background 0.15s, transform 0.1s; }
    .calc-btn:hover { background: var(--accent-dark); }
    .calc-btn:active { transform: scale(0.98); }
    .result-card { display: none; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    .result-card.show { display: block; }
    .result-hero { background: var(--accent); padding: 28px; color: #fff; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .result-hero-item { text-align: center; }
    .result-hero-label { font-size: 11px; opacity: 0.75; margin-bottom: 6px; font-weight: 300; }
    .result-hero-value { font-family: 'DM Mono', monospace; font-size: clamp(18px, 3vw, 26px); font-weight: 500; }
    .result-body { padding: 24px 28px; }
    .summary-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .summary-box { background: var(--bg); border-radius: 10px; padding: 14px 16px; text-align: center; }
    .summary-box .s-label { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; font-weight: 300; }
    .summary-box .s-value { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; }
    .summary-box.highlight .s-value { color: var(--accent); }
    .info-box { margin-top: 16px; padding: 14px 16px; background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px; font-size: 12px; color: #92400e; font-weight: 300; line-height: 1.6; }
    .share-row { display: flex; gap: 8px; margin-top: 16px; }
    .share-btn { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); font-size: 13px; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: background 0.15s; color: var(--text-muted); }
    .share-btn:hover { background: var(--bg); color: var(--text); }
  </style>
  <script src="/theme.js"></script>
  <script src="/footer.js"></script>
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="/" class="logo">calc<span>zip</span>.kr</a>
      <a href="/" class="back-btn">← 전체 계산기</a>
      <button id="theme-toggle" class="theme-toggle"><span class="toggle-icon">🌙</span><span class="toggle-text">다크</span></button>
    </div>
  </header>
  <main>
    <p class="page-label">Finance · Loan</p>
    <h1>신용대출 계산기</h1>
    <p class="page-sub">거치식(이자만) · 원리금균등 방식 / 월 상환금 + 총이자</p>
    <div class="layout">
      <div class="card">
        <div class="card-title">입력</div>
        <div class="tab-group">
          <button class="tab-btn active" id="tab-interest-only" onclick="setMethod('interest-only')">거치식 (이자만)</button>
          <button class="tab-btn" id="tab-equal-payment" onclick="setMethod('equal-payment')">원리금균등</button>
        </div>
        <div class="field">
          <label>대출 금액</label>
          <div class="input-wrap">
            <input type="number" id="loan-amount" placeholder="예: 3000" />
            <span class="input-unit">만원</span>
          </div>
        </div>
        <div class="field">
          <label>연 이자율</label>
          <div class="input-wrap">
            <input type="number" id="interest-rate" placeholder="예: 5.5" step="0.01" />
            <span class="input-unit">%</span>
          </div>
        </div>
        <div class="field" id="period-field">
          <label>대출 기간</label>
          <div class="input-wrap">
            <input type="number" id="loan-period" placeholder="예: 3" />
            <span class="input-unit">년</span>
          </div>
        </div>
        <button class="calc-btn" onclick="calculate()">이자 계산하기</button>
      </div>
      <div id="result-card" class="result-card">
        <div class="result-hero">
          <div class="result-hero-item">
            <div class="result-hero-label" id="r-hero-label">월 납입금</div>
            <div class="result-hero-value" id="r-monthly">—</div>
          </div>
          <div class="result-hero-item">
            <div class="result-hero-label">총 상환금</div>
            <div class="result-hero-value" id="r-total">—</div>
          </div>
        </div>
        <div class="result-body">
          <div class="summary-grid">
            <div class="summary-box">
              <div class="s-label">대출 원금</div>
              <div class="s-value" id="r-principal">—</div>
            </div>
            <div class="summary-box highlight">
              <div class="s-label">총 이자</div>
              <div class="s-value" id="r-interest">—</div>
            </div>
            <div class="summary-box">
              <div class="s-label">이자 비율</div>
              <div class="s-value" id="r-ratio">—</div>
            </div>
          </div>
          <div class="info-box">
            ⚠️ 실제 대출 이자는 은행별 우대금리, 수수료 등에 따라 달라질 수 있어요. 본 계산은 참고용이에요.
          </div>
          <div class="share-row">
            <button class="share-btn" onclick="resetAll()">↺ 다시 계산</button>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script>
    let method = 'interest-only';
    function setMethod(m) {
      method = m;
      document.getElementById('tab-interest-only').classList.toggle('active', m === 'interest-only');
      document.getElementById('tab-equal-payment').classList.toggle('active', m === 'equal-payment');
    }
    function fmt(n) { return Math.round(n).toLocaleString('ko-KR') + '원'; }
    function fmtShort(n) {
      n = Math.round(n);
      if (n >= 10000) return Math.floor(n/10000).toLocaleString() + '만원';
      return n.toLocaleString() + '원';
    }
    function calculate() {
      const amount = parseFloat(document.getElementById('loan-amount').value) * 10000 || 0;
      const rate = parseFloat(document.getElementById('interest-rate').value) || 0;
      const years = parseFloat(document.getElementById('loan-period').value) || 0;
      if (!amount || !rate || !years) { alert('모든 항목을 입력해주세요.'); return; }
      const monthlyRate = rate / 100 / 12;
      const months = years * 12;
      let monthly, totalInterest;
      if (method === 'interest-only') {
        monthly = amount * monthlyRate;
        totalInterest = monthly * months;
        document.getElementById('r-hero-label').textContent = '월 이자';
      } else {
        monthly = amount * monthlyRate * Math.pow(1+monthlyRate, months) / (Math.pow(1+monthlyRate, months) - 1);
        totalInterest = monthly * months - amount;
        document.getElementById('r-hero-label').textContent = '월 납입금';
      }
      const totalPayment = amount + totalInterest;
      document.getElementById('r-monthly').textContent = fmtShort(monthly);
      document.getElementById('r-total').textContent = fmtShort(totalPayment);
      document.getElementById('r-principal').textContent = fmtShort(amount);
      document.getElementById('r-interest').textContent = fmtShort(totalInterest);
      document.getElementById('r-ratio').textContent = (totalInterest / amount * 100).toFixed(1) + '%';
      document.getElementById('result-card').classList.add('show');
      setTimeout(() => document.getElementById('result-card').scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
    }
    function resetAll() {
      document.getElementById('loan-amount').value = '';
      document.getElementById('interest-rate').value = '';
      document.getElementById('loan-period').value = '';
      document.getElementById('result-card').classList.remove('show');
    }
  </script>
</body>
</html>
